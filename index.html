<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="RootAccess - Cyberpunk desktop hacking game shell"
    />
    <title>RootAccess // Boot Sequence</title>
    <link rel="stylesheet" href="./main.css" />
  </head>
  <body>
    <noscript>
      <div class="boot-fallback boot-fallback--visible" role="alert">
        RootAccess requires JavaScript enabled to initialize.
      </div>
    </noscript>

    <div id="boot-fallback" class="boot-fallback boot-fallback--visible" role="alert" aria-live="polite">
      RootAccess is initializing…
    </div>

    <div id="root" class="app-root" hidden>
      <div id="experience-layer" class="experience-layer">
        <section id="intro-screen" class="intro-screen" aria-label="intro cutscene">
          <div class="intro-card">
            <h1>ROOTACCESS</h1>
            <p id="intro-stream" class="intro-stream">Initializing secure channel…</p>
            <button id="skip-intro" class="intro-btn" type="button">Skip</button>
          </div>
        </section>

        <section id="login-screen" class="login-screen" hidden aria-label="login screen">
          <form id="login-form" class="login-card" novalidate>
            <h2>ACCESS TERMINAL</h2>
            <p id="auth-mode-label" class="login-mode">Mode: Sign in</p>
            <label>
              Neural_ID
              <input id="neural-id" name="neuralId" type="text" autocomplete="username" required />
            </label>
            <label>
              Decrypt-Key
              <input id="decrypt-key" name="decryptKey" type="password" autocomplete="current-password" required />
            </label>
            <button id="login-submit" type="submit">Authenticate</button>
            <button id="auth-mode-toggle" type="button" class="login-toggle">Need an account? Create one</button>
            <p class="login-note">Firebase email/password auth only in this phase. Use Sign up to create your account first.</p>
            <p id="login-error" class="login-error" role="alert" aria-live="polite"></p>
          </form>
        </section>
      </div>

      <div id="desktop-shell" class="desktop-shell" hidden>
        <div class="desktop-backdrop" aria-hidden="true">
          <div class="grid-overlay"></div>
          <div class="scanline-overlay"></div>
          <div class="noise-overlay"></div>
        </div>

        <header class="desktop-topbar">
          <div class="brand">ROOTACCESS</div>
          <div class="status" id="boot-status">AUTH REQUIRED</div>
        </header>

        <main class="desktop-surface" id="desktop-surface" aria-label="RootAccess desktop shell">
          <section class="window-layer" id="window-layer" aria-label="window manager layer"></section>
        </main>

        <aside class="quick-panel" id="quick-panel" aria-label="render settings">
          <button class="quick-toggle" id="effects-toggle" type="button" aria-pressed="true">
            Effects: ON
          </button>
          <span class="quality-chip" id="quality-chip">Quality: Balanced</span>
        </aside>

        <footer class="taskbar" aria-label="Taskbar">
          <button class="taskbar-app" data-app="terminal">Terminal</button>
          <button class="taskbar-app" data-app="market">Black Market</button>
          <button class="taskbar-app" data-app="index">Index</button>
          <button class="taskbar-app" data-app="blockchain">Blockchain</button>
          <button class="taskbar-app" data-app="settings">Settings</button>
          <button class="taskbar-app" data-app="admin">Admin</button>
        </footer>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
